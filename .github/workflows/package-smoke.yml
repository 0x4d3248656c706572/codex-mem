name: Package Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Version
        run: node index.js version

      - name: Help
        run: node index.js --help

      - name: Pack Dry Run
        run: npm pack --dry-run
