<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220">
        <animate attributeName="stop-color" values="#0B1220;#111827;#0B1220" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#13203B">
        <animate attributeName="stop-color" values="#13203B;#1D4ED8;#13203B" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="line" x1="160" y1="140" x2="1040" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>

  <g opacity="0.18">
    <circle cx="190" cy="104" r="2" fill="#93C5FD"/>
    <circle cx="1038" cy="418" r="2" fill="#6EE7B7"/>
    <circle cx="964" cy="92" r="2" fill="#93C5FD"/>
    <circle cx="148" cy="420" r="2" fill="#6EE7B7"/>
  </g>

  <path d="M164 360C250 254 370 192 492 192C665 192 732 308 858 308C935 308 1008 274 1042 236" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 16" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-52" dur="3.6s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#glow)">
    <circle cx="164" cy="360" r="8" fill="#93C5FD">
      <animate attributeName="r" values="8;10;8" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="492" cy="192" r="8" fill="#60A5FA">
      <animate attributeName="r" values="8;11;8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="858" cy="308" r="8" fill="#34D399">
      <animate attributeName="r" values="8;11;8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1042" cy="236" r="8" fill="#6EE7B7">
      <animate attributeName="r" values="8;10;8" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(120 92)">
    <rect x="0" y="0" width="960" height="336" rx="22" fill="#0F172A" fill-opacity="0.82" stroke="#334155"/>
    <rect x="0" y="0" width="960" height="56" rx="22" fill="#111827"/>
    <circle cx="28" cy="28" r="6" fill="#F87171"/>
    <circle cx="50" cy="28" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="28" r="6" fill="#34D399"/>

    <g transform="translate(96 92)">
      <rect x="0" y="0" width="70" height="70" rx="16" fill="#111827" stroke="#334155"/>
      <path d="M26 22L38 35L26 48" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M46 48H62" stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
    </g>

    <text x="208" y="128" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">codex-mem</text>
    <text x="208" y="182" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="24">Persistent memory for Codex</text>
    <text x="208" y="224" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="20">Context that survives sessions, stays searchable, and shows up when it matters.</text>

    <g transform="translate(88 264)">
      <rect x="0" y="0" width="784" height="34" rx="10" fill="#0B1220" stroke="#23324A"/>
      <text x="22" y="22" fill="#60A5FA" font-family="Consolas, monospace" font-size="18">$</text>
      <text x="44" y="22" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">npx codex-mem install --ide codex-cli</text>
    </g>

    <g transform="translate(88 312)">
      <rect x="0" y="0" width="784" height="34" rx="10" fill="#0B1220" stroke="#23324A"/>
      <text x="22" y="22" fill="#34D399" font-family="Consolas, monospace" font-size="18">$</text>
      <text x="44" y="22" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">npx codex-mem start</text>
      <rect x="266" y="9" width="10" height="16" fill="#93C5FD">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
